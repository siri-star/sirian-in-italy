<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Italian Adventure</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary-bg: #F9F6F0; 
            --accent-color: #C84C35; 
            --accent-hover: #A63B28;
            --food-color: #D34E24;
            --shop-color: #205E7D;
            --stay-color: #B8860B; 
            --sight-color: #722F37; 
            --nature-color: #4A6B53; 
            --text-main: #2C2C2C;
            --text-light: #666666;
            --card-bg: #FFFFFF;
            --border-light: #EBE6DE;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            text-align: center;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            z-index: 1000;
            border-bottom: 2px solid var(--accent-color);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            margin: 0;
            font-size: 2.4rem;
        }

        p.subtitle {
            margin: 8px 0 0 0;
            color: var(--text-light);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 14px 24px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        .fab-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-4px) scale(1.05);
        }

        /* Sidebar Styling */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 550px; /* Made slightly wider for easier reading */
            height: 100vh;
            background-color: #FFFFFF; /* Clean white background for copy-pasting */
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            z-index: 2500;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .sidebar-header {
            padding: 25px 30px 15px 30px;
            background-color: #FAFAFA;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-close:hover { background: var(--accent-color); color: white; }

        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            padding-bottom: 100px;
            user-select: all; /* Ensures easy highlighting */
        }

        /* Modal & UI Styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 44, 44, 0.6); 
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            border-radius: 16px;
            padding: 35px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }
        #welcomeOverlay .modal-content { text-align: center; max-width: 500px; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }

        .close-btn:hover { background: var(--accent-color); }
        .modal-hero-img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 25px; }
        
        .why-block {
            background: #F4E8EA; border-left: 4px solid #722F37; padding: 18px 20px; margin: 25px 0; border-radius: 0 8px 8px 0; text-align: left;
        }
        .why-block h3 { margin-top: 0; color: #722F37; font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 8px; }
        .why-block p { margin: 0; font-style: italic; }

        .next-btn {
            background-color: var(--accent-color); color: white; border: none; padding: 16px 24px; font-size: 1.1rem; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%;
        }

        details { background: #FFFFFF; border-radius: 8px; border: 1px solid var(--border-light); margin-bottom: 12px; }
        summary { padding: 18px 20px; font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.2rem; cursor: pointer; list-style: none; display: flex; justify-content: space-between; }
        summary::-webkit-details-marker { display: none; }
        summary:after { content: "+"; color: var(--accent-color); }
        details[open] summary:after { transform: rotate(45deg); }
        details[open] summary { background: var(--primary-bg); border-bottom: 1px solid var(--border-light); }
        .details-content { padding: 20px; font-size: 1rem; line-height: 1.6; }

        h2 { font-family: 'Playfair Display', serif; color: var(--accent-color); border-bottom: 2px solid var(--border-light); padding-bottom: 12px; margin-top: 0; margin-bottom: 20px; font-size: 2rem; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .tag { display: inline-flex; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .tag.history { background: #F4E8EA; color: #722F37; } 
        .tag.food { background: #FCEEEB; color: #D34E24; } 
        .tag.nature { background: #EAF1EB; color: #4A6B53; } 
        .tag.water { background: #E6F0F5; color: #205E7D; } 
        .tag.stay { background: #FDF6E3; color: #B8860B; } 

        a { color: var(--accent-color); text-decoration: none; font-weight: 700; }
        ul { padding-left: 20px; margin-top: 5px; }
        li { margin-bottom: 12px; }

        /* CYOA & Shimmer Styles */
        .cyoa-container { margin: 15px 0; padding: 20px; background: #FAFAFA; border-radius: 12px; border: 2px dashed #EBE6DE; }
        .cyoa-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent-color); margin-top: 0; margin-bottom: 15px; text-align: center; }
        .cyoa-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .cyoa-btn { flex: 1; padding: 10px 5px; border: 2px solid var(--accent-color); background: transparent; color: var(--accent-color); border-radius: 8px; font-weight: 700; cursor: pointer; }
        .cyoa-btn.active { background: var(--accent-color); color: white; }
        .cyoa-content { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border-light); min-height: 100px; }
        
        .shimmer-block {
            padding: 10px 0;
        }
        .shimmer-line {
            height: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%;
            animation: placeholderShimmer 1.5s linear infinite forwards;
        }
        .shimmer-line.w-90 { width: 90%; }
        .shimmer-line.w-75 { width: 75%; }
        .shimmer-line.w-50 { width: 50%; }

        @keyframes placeholderShimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }

        /* Map Pins */
        .custom-pin { background-color: var(--accent-color); border: 2px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 700; }
        .food-pin { background-color: var(--food-color); font-size: 14px; }
        .shop-pin { background-color: var(--shop-color); font-size: 14px; }
        .stay-pin { background-color: var(--stay-color); font-size: 14px; }
        .sight-pin { background-color: var(--sight-color); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>Our Italian Adventure</h1>
        <p class="subtitle">14 Days of History, Art & Culinary Magic</p>
    </header>

    <div id="map"></div>

    <button class="fab-btn" onclick="toggleSidebar()">📜 View Itinerary</button>

    <div class="sidebar" id="itinerarySidebar">
        <div class="sidebar-header">
            <span style="font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent-color);">Itinerary Document</span>
            <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
        </div>
        <!-- This container holds pure text/HTML designed perfectly for copy-pasting -->
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>

    <div class="modal-overlay active" id="welcomeOverlay">
        <div class="modal-content">
            <h2 style="border: none; margin-bottom: 10px;">Happy 25th Birthday, Damian!! 💜</h2>
            <p style="font-size: 1.1rem; color: var(--text-light); line-height: 1.6; margin-bottom: 30px;">
                [I will write my birthday message to you here...]
            </p>
            <button class="next-btn" onclick="startAdventure()">Start Our Adventure ➔</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="itineraryDetails"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([43.0, 12.0], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 20
        }).addTo(map);

        // State object defaults to null so the shimmers show until picked!
        const adventureState = {
            rome: null,
            assisi: null,
            florence: null,
            cinque: null,
            venice: null
        };

        const locations = [
            { id: 'rome', step: 1, name: 'Start: Rome', coords: [41.9028, 12.4964] },
            { id: 'assisi', step: 2, name: 'Assisi', coords: [43.0702, 12.6186] },
            { id: 'florence', step: 3, name: 'Florence', coords: [43.7695, 11.2558] },
            { id: 'cinque', step: 4, name: 'Cinque Terre', coords: [44.1353, 9.6828] },
            { id: 'venice', step: 5, name: 'End: Venice', coords: [45.4408, 12.3155] }
        ];

        const extraLocations = [
            { id: 'rome-stay', type: 'stay', emoji: '🛏️', name: 'Casa di Santa Brigida', coords: [41.8955, 12.4711], desc: "Traditional convent stay offering private rooms right in the historic center." },
            { id: 'colosseum', type: 'sight', emoji: '⚔️', name: 'Colosseum', coords: [41.8902, 12.4922], desc: "The ultimate symbol of imperial power and the ancient world." },
            { id: 'taverna', type: 'food', emoji: '🍝', name: 'La Taverna dei Fori Imperiali', coords: [41.8943, 12.4891], desc: "Renowned family-run restaurant serving classic Roman dishes like Abbacchio al Forno." },
            { id: 'maritozzaro', type: 'food', emoji: '🥐', name: 'Il Maritozzaro', coords: [41.8814, 12.4646], desc: "Famous for serving the ultimate Maritozzo sweet bun." },
            { id: 'assisi-stay', type: 'stay', emoji: '🛏️', name: 'Monastero Sant\'Andrea', coords: [43.0715, 12.6135], desc: "Medieval stone monastery offering panoramic views of the Umbrian valley." },
            { id: 'pallotta', type: 'food', emoji: '🍷', name: 'Trattoria Pallotta', coords: [43.0712, 12.6163], desc: "Trattoria specializing in Umbrian Stringozzi pasta and black truffles." },
            { id: 'florence-stay', type: 'stay', emoji: '🛏️', name: 'Fattoria Il Milione', coords: [43.7380, 11.2185], desc: "A stunning 15th-century estate set on 50 hectares of parkland in the Chianti hills." },
            { id: 'vinaio', type: 'food', emoji: '🥪', name: "All'Antico Vinaio", coords: [43.7684, 11.2573], desc: "Italy's most famous street food spot for massive schiacciata bread sandwiches." },
            { id: 'cinque-stay', type: 'stay', emoji: '🛏️', name: 'Affittacamere Anna', coords: [44.1705, 9.6148], desc: "Comfortable, locally-run guesthouse basecamp in Levanto." },
            { id: 'nessun', type: 'food', emoji: '🥂', name: 'Nessun Dorma', coords: [44.1065, 9.7275], desc: "World-famous Manarola cliffside terrace focusing on bruschetta and meat platters." },
            { id: 'venice-stay', type: 'stay', emoji: '🛏️', name: 'Foresteria Valdese', coords: [45.4374, 12.3392], desc: "Historic religious guest house located in the quiet Castello district." },
            { id: 'domori', type: 'food', emoji: '🍢', name: 'Cantina Do Mori', coords: [45.4388, 12.3338], desc: "The oldest wine bar in Venice (est. 1462). A mandatory stop for cicchetti." }
        ];

        const latlngs = locations.map(loc => loc.coords);
        L.polyline(latlngs, { color: '#4A6B53', weight: 3, dashArray: '8, 8' }).addTo(map);

        // Generates the Shimmer effect block
        function getShimmerBlock() {
            return `
                <div class="shimmer-block">
                    <div class="shimmer-line w-90"></div>
                    <div class="shimmer-line w-75"></div>
                    <div class="shimmer-line w-90"></div>
                    <div class="shimmer-line w-50"></div>
                </div>
            `;
        }

        function getItineraryHtml(cityId) {
            if (cityId === 'rome') {
                return `
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Colosseum_in_Rome-April_2007-1-_copie_2B.jpg/800px-Colosseum_in_Rome-April_2007-1-_copie_2B.jpg" class="modal-hero-img">
                    <h2>Days 1–3: Rome</h2>
                    <div class="why-block"><h3>💜 Why I chose this for us</h3><p>[Personal note here...]</p></div>
                    <details open><summary>Day 1: Arrival</summary><div class="details-content"><ul>
                        <li><strong>2:00 PM:</strong> Arrive, check into convent.</li>
                        <li><strong>4:00 PM:</strong> The Pantheon.</li>
                        <li><strong>6:30 PM:</strong> Twilight Walking Food Tour.</li>
                    </ul></div></details>
                    <details open><summary>Day 2: Ancient World</summary><div class="details-content"><ul>
                        <li><strong>9:00 AM:</strong> Colosseum and Roman Forum.</li>
                        <li><strong>8:00 PM:</strong> Dinner at La Taverna dei Fori Imperiali.</li>
                    </ul></div></details>
                    <div class="cyoa-container">
                        <h4 class="cyoa-title">✨ Choose Your Adventure: Day 3 ✨</h4>
                        <div class="cyoa-toggle">
                            <button class="cyoa-btn ${adventureState.rome === 'A' ? 'active' : ''}" onclick="updateAdventure('rome', 'A')">Vatican & Art</button>
                            <button class="cyoa-btn ${adventureState.rome === 'B' ? 'active' : ''}" onclick="updateAdventure('rome', 'B')">E-Bikes & Catacombs</button>
                        </div>
                        <div class="cyoa-content">
                            ${!adventureState.rome ? getShimmerBlock() : adventureState.rome === 'A' ? `
                                <ul><li><strong>8:00 AM:</strong> Vatican Museums & Sistine Chapel.</li><li><strong>3:30 PM:</strong> Borghese Gallery.</li></ul>
                            ` : `
                                <ul><li><strong>9:00 AM:</strong> E-bikes down the Via Appia Antica!</li><li><strong>11:30 AM:</strong> Explore Christian Catacombs.</li></ul>
                            `}
                        </div>
                    </div>
                    <button class="next-btn" onclick="openCityCard('assisi', 43.0702, 12.6186)">Next Stop: Assisi ➔</button>
                `;
            }
            if (cityId === 'assisi') {
                return `
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Assisi_panorama.jpg/800px-Assisi_panorama.jpg" class="modal-hero-img">
                    <h2>Day 4: Assisi</h2>
                    <div class="why-block"><h3>💜 Why I chose this for us</h3><p>[Personal note here...]</p></div>
                    <details open><summary>Day 4 Morning: Monastic Life</summary><div class="details-content"><ul>
                        <li><strong>11:30 AM:</strong> Check into hilltop monastery.</li>
                        <li><strong>1:00 PM:</strong> Basilica of San Francesco.</li>
                    </ul></div></details>
                    <div class="cyoa-container">
                        <h4 class="cyoa-title">✨ Choose Your Adventure: Afternoon ✨</h4>
                        <div class="cyoa-toggle">
                            <button class="cyoa-btn ${adventureState.assisi === 'A' ? 'active' : ''}" onclick="updateAdventure('assisi', 'A')">Spiritual Hike</button>
                            <button class="cyoa-btn ${adventureState.assisi === 'B' ? 'active' : ''}" onclick="updateAdventure('assisi', 'B')">Truffle Hunting</button>
                        </div>
                        <div class="cyoa-content">
                            ${!adventureState.assisi ? getShimmerBlock() : adventureState.assisi === 'A' ? `
                                <ul><li><strong>3:30 PM:</strong> Hike Mount Subasio to Eremo delle Carceri.</li><li><strong>7:30 PM:</strong> Dinner at Trattoria Pallotta.</li></ul>
                            ` : `
                                <ul><li><strong>2:30 PM:</strong> Truffle hunting in the woods with dogs!</li><li><strong>5:30 PM:</strong> Farmhouse meal with truffles and cured pork.</li></ul>
                            `}
                        </div>
                    </div>
                    <button class="next-btn" onclick="openCityCard('florence', 43.7695, 11.2558)">Next Stop: Florence ➔</button>
                `;
            }
            if (cityId === 'florence') {
                return `
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Florence_italy_duomo.jpg/800px-Florence_italy_duomo.jpg" class="modal-hero-img">
                    <h2>Days 5–7: Florence</h2>
                    <div class="why-block"><h3>💜 Why I chose this for us</h3><p>[Personal note here...]</p></div>
                    <details open><summary>Day 5 & 6: Art & Steak</summary><div class="details-content"><ul>
                        <li><strong>Day 5:</strong> Uffizi Gallery & Ponte Vecchio.</li>
                        <li><strong>Day 6:</strong> Accademia Gallery, Florence Duomo climb, and huge schiacciata sandwiches.</li>
                    </ul></div></details>
                    <div class="cyoa-container">
                        <h4 class="cyoa-title">✨ Choose Your Adventure: Day 7 ✨</h4>
                        <div class="cyoa-toggle">
                            <button class="cyoa-btn ${adventureState.florence === 'A' ? 'active' : ''}" onclick="updateAdventure('florence', 'A')">Chianti Vespa Tour</button>
                            <button class="cyoa-btn ${adventureState.florence === 'B' ? 'active' : ''}" onclick="updateAdventure('florence', 'B')">Siena & Sweets</button>
                        </div>
                        <div class="cyoa-content">
                            ${!adventureState.florence ? getShimmerBlock() : adventureState.florence === 'A' ? `
                                <ul><li><strong>9:00 AM:</strong> Vintage Fiat/Vespa tour through Chianti.</li><li><strong>5:00 PM:</strong> Scuola del Cuoio leather school.</li></ul>
                            ` : `
                                <ul><li><strong>9:00 AM:</strong> Bus to Siena's Gothic Cathedral.</li><li><strong>2:00 PM:</strong> Indulge in Siena's famous Panforte and Ricciarelli sweets.</li></ul>
                            `}
                        </div>
                    </div>
                    <button class="next-btn" onclick="openCityCard('cinque', 44.1353, 9.6828)">Next Stop: Cinque Terre ➔</button>
                `;
            }
            if (cityId === 'cinque') {
                return `
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Manarola_-_Cinque_Terre_-_Italy.jpg/800px-Manarola_-_Cinque_Terre_-_Italy.jpg" class="modal-hero-img">
                    <h2>Days 8–10: Cinque Terre</h2>
                    <div class="why-block"><h3>💜 Why I chose this for us</h3><p>[Personal note here...]</p></div>
                    <details open><summary>Day 8 & 9: Cliffs & Pesto</summary><div class="details-content"><ul>
                        <li><strong>Day 8:</strong> Arrive in Levanto, sunset at Nessun Dorma.</li>
                        <li><strong>Day 9:</strong> Hike Sentiero Azzurro, eat fresh calamari in Riomaggiore.</li>
                    </ul></div></details>
                    <div class="cyoa-container">
                        <h4 class="cyoa-title">✨ Choose Your Adventure: Day 10 ✨</h4>
                        <div class="cyoa-toggle">
                            <button class="cyoa-btn ${adventureState.cinque === 'A' ? 'active' : ''}" onclick="updateAdventure('cinque', 'A')">Pesto & Vineyards</button>
                            <button class="cyoa-btn ${adventureState.cinque === 'B' ? 'active' : ''}" onclick="updateAdventure('cinque', 'B')">Sanctuary Hike</button>
                        </div>
                        <div class="cyoa-content">
                            ${!adventureState.cinque ? getShimmerBlock() : adventureState.cinque === 'A' ? `
                                <ul>
                                    <li><strong>10:00 AM:</strong> Authentic Pesto Making Masterclass in the hills of Manarola.</li>
                                    <li><strong>2:00 PM:</strong> Walk through the steeply terraced vineyards for a dry-land wine tasting overlooking the sea.</li>
                                </ul>
                            ` : `
                                <ul>
                                    <li><strong>9:00 AM:</strong> Take the scenic inland hike up to the Sanctuary of Montenero (solid ground, amazing views!).</li>
                                    <li><strong>1:00 PM:</strong> Reward ourselves with massive slices of warm, oil-soaked focaccia bread in the village square.</li>
                                </ul>
                            `}
                        </div>
                    </div>
                    <button class="next-btn" onclick="openCityCard('venice', 45.4408, 12.3155)">Next Stop: Venice ➔</button>
                `;
            }
            if (cityId === 'venice') {
                return `
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Grand_Canal_Venice.jpg/800px-Grand_Canal_Venice.jpg" class="modal-hero-img">
                    <h2>Days 11–14: Venice</h2>
                    <div class="why-block"><h3>💜 Why I chose this for us</h3><p>[Personal note here...]</p></div>
                    <details open><summary>Day 11 & 12: Casanova & Canals</summary><div class="details-content"><ul>
                        <li><strong>Day 11:</strong> Vaporetto ride, evening in Campo Santa Margherita.</li>
                        <li><strong>Day 12:</strong> Doge's Palace Secret Itineraries, evening Cicchetti crawl.</li>
                    </ul></div></details>
                    <div class="cyoa-container">
                        <h4 class="cyoa-title">✨ Choose Your Adventure: Day 13 ✨</h4>
                        <div class="cyoa-toggle">
                            <button class="cyoa-btn ${adventureState.venice === 'A' ? 'active' : ''}" onclick="updateAdventure('venice', 'A')">Glass & Masks</button>
                            <button class="cyoa-btn ${adventureState.venice === 'B' ? 'active' : ''}" onclick="updateAdventure('venice', 'B')">Hidden Cannaregio</button>
                        </div>
                        <div class="cyoa-content">
                            ${!adventureState.venice ? getShimmerBlock() : adventureState.venice === 'A' ? `
                                <ul><li><strong>10:00 AM:</strong> Murano Glass blowing.</li><li><strong>2:00 PM:</strong> Ca' Macana Mask making.</li></ul>
                            ` : `
                                <ul>
                                    <li><strong>10:00 AM:</strong> Deep dive walking tour into the historic Jewish Ghetto and Cannaregio district (firmly on land!).</li>
                                    <li><strong>3:00 PM:</strong> Spend the afternoon hopping between traditional bakeries hunting for Venetian sweet fritters.</li>
                                </ul>
                            `}
                        </div>
                    </div>
                `;
            }
        }

        locations.forEach(loc => {
            const m = L.marker(loc.coords, { 
                icon: L.divIcon({ className: 'custom-pin', html: `<span>${loc.step}</span>`, iconSize: [36, 36], iconAnchor: [18, 18] }),
                zIndexOffset: 1000 
            }).addTo(map);
            m.bindTooltip(loc.name, { direction: 'top' });
            m.on('click', () => {
                document.getElementById('itineraryDetails').innerHTML = getItineraryHtml(loc.id);
                document.getElementById('modalOverlay').classList.add('active');
            });
        });

        window.updateAdventure = function(cityId, choice) {
            adventureState[cityId] = choice;
            document.getElementById('itineraryDetails').innerHTML = getItineraryHtml(cityId);
            // We do not auto-refresh the text-sidebar here, it generates fresh when opened.
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('itinerarySidebar');
            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            } else {
                closeModal(); 
                populateSidebar();
                sidebar.classList.add('active');
            }
        }

        // Generates PURE SEMANTIC HTML text for easy copying to Google Docs!
        function populateSidebar() {
            const content = `
                <div style="font-family: Arial, sans-serif; color: #000; line-height: 1.6; max-width: 100%;">

                    </ul>

                    <ul>

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target === this) closeModal(); });

        function startAdventure() {
            document.getElementById('welcomeOverlay').classList.remove('active');
            openCityCard('rome', 41.9028, 12.4964);
        }

        function openCityCard(cityId, lat, lng) {
            closeModal();
            map.flyTo([lat, lng], 13, { duration: 1.5, easeLinearity: 0.25 });
            setTimeout(() => {
                document.getElementById('itineraryDetails').innerHTML = getItineraryHtml(cityId);
                document.getElementById('modalOverlay').classList.add('active');
            }, 1000);
        }
    </script>
</body>
</html>
