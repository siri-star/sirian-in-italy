<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Italian Adventure</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            /* Modern Italian Palette */
            --primary-bg: #F9F6F0; 
            --accent-color: #C84C35; 
            --accent-hover: #A63B28;
            
            /* Pin Colors */
            --food-color: #D34E24;
            --shop-color: #205E7D;
            --stay-color: #B8860B; 
            --sight-color: #722F37; 
            --nature-color: #4A6B53; 
            
            --text-main: #2C2C2C;
            --text-light: #666666;
            --card-bg: #FFFFFF;
            --border-light: #EBE6DE;
            --route-color: #4A6B53; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevents background scrolling when sidebar is open */
        }

        header {
            background-color: var(--card-bg);
            text-align: center;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            z-index: 1000;
            border-bottom: 2px solid var(--accent-color);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            margin: 0;
            font-size: 2.4rem;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            margin: 8px 0 0 0;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        /* Floating Action Button for the Sidebar */
        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 14px 24px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fab-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 20px rgba(200,76,53,0.4);
        }

        /* Slide-out Sidebar Styling */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--primary-bg);
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            z-index: 2500;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-header {
            background-color: var(--card-bg);
            padding: 25px 30px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            font-size: 1.8rem;
        }

        .sidebar-close {
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-close:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.1);
        }

        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            padding-bottom: 100px;
        }

        /* Modify specific elements inside the sidebar */
        .sidebar-content .sidebar-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* Modal Overlays */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 44, 44, 0.6); 
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            border-radius: 16px;
            padding: 35px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        #welcomeOverlay .modal-content {
            text-align: center;
            max-width: 500px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .close-btn:hover {
            background: var(--accent-color);
            transform: scale(1.05);
        }

        .modal-hero-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        /* "Why I chose this" Block */
        .why-block {
            background: #F4E8EA;
            border-left: 4px solid #722F37;
            padding: 18px 20px;
            margin: 25px 0;
            border-radius: 0 8px 8px 0;
            text-align: left;
        }

        .why-block h3 {
            margin-top: 0;
            color: #722F37;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .why-block p {
            margin: 0;
            color: var(--text-main);
            font-style: italic;
        }

        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
            display: block;
        }

        .next-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        details {
            margin-bottom: 12px;
            background: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            text-align: left;
        }

        summary {
            padding: 18px 20px;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary::-webkit-details-marker { display: none; }

        summary:after {
            content: "+";
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            color: var(--accent-color);
            transition: transform 0.3s;
        }

        details[open] summary:after { transform: rotate(45deg); }
        details[open] summary { background: var(--primary-bg); border-bottom: 1px solid var(--border-light); }

        .details-content { padding: 20px; font-size: 1rem; line-height: 1.7; color: var(--text-light); text-align: left; }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 12px;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .tag-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; justify-content: flex-start; }
        .tag { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .tag.history { background: #F4E8EA; color: #722F37; } 
        .tag.food { background: #FCEEEB; color: #D34E24; } 
        .tag.nature { background: #EAF1EB; color: #4A6B53; } 
        .tag.water { background: #E6F0F5; color: #205E7D; } 
        .tag.stay { background: #FDF6E3; color: #B8860B; } 

        a { color: var(--accent-color); text-decoration: none; font-weight: 700; border-bottom: 1px solid transparent; transition: all 0.2s; }
        a:hover { color: var(--accent-hover); border-bottom: 1px solid var(--accent-hover); }
        ul { padding-left: 20px; margin-top: 5px; }
        li { margin-bottom: 10px; }

        /* Map Pins */
        .custom-pin {
            background-color: var(--accent-color);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
        }

        .custom-pin:hover {
            transform: scale(1.15) translateY(-5px);
            background-color: var(--accent-hover);
            box-shadow: 0 6px 15px rgba(200,76,53,0.4);
        }

        .food-pin { background-color: var(--food-color); border-color: #FCEEEB; font-size: 14px; }
        .food-pin:hover { background-color: #BA421D; }
        .shop-pin { background-color: var(--shop-color); border-color: #E6F0F5; font-size: 14px; }
        .shop-pin:hover { background-color: #174861; }
        .stay-pin { background-color: var(--stay-color); border-color: #FDF6E3; font-size: 14px; }
        .stay-pin:hover { background-color: #8B6508; }
        .sight-pin { background-color: var(--sight-color); border-color: #F4E8EA; font-size: 14px; }
        .sight-pin:hover { background-color: #4A1A24; }
        .nature-pin { background-color: var(--nature-color); border-color: #EAF1EB; font-size: 14px; }
        .nature-pin:hover { background-color: #2F4535; }

    </style>
</head>
<body>

    <header>
        <h1>Our Italian Adventure</h1>
        <p class="subtitle">14 Days of History, Art & Culinary Magic</p>
    </header>

    <div id="map"></div>

    <!-- Floating Button for Side Menu -->
    <button class="fab-btn" onclick="toggleSidebar()">
        📜 View Itinerary
    </button>

    <!-- Slide-out Side Menu for Text View -->
    <div class="sidebar" id="itinerarySidebar">
        <div class="sidebar-header">
            <h2>Timeline</h2>
            <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
        </div>
        <div class="sidebar-content" id="sidebarContent">
            <!-- This will be populated automatically by JavaScript -->
        </div>
    </div>

    <!-- Birthday Welcome Modal -->
    <div class="modal-overlay active" id="welcomeOverlay">
        <div class="modal-content">
            <h2 style="border: none; margin-bottom: 10px;">Happy 25th Birthday, Damian!! 💜</h2>
            <p style="font-size: 1.1rem; color: var(--text-light); line-height: 1.6; margin-bottom: 30px;">
                [I will write my birthday message to you here...]
            </p>
            <button class="next-btn" onclick="startAdventure()">Start Our Adventure ➔</button>
        </div>
    </div>

    <!-- Main Itinerary Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="itineraryDetails"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([43.0, 12.0], 7);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 1. The Main City Hubs (Numbered)
        const locations = [
            { id: 'rome', step: 1, name: 'Start: Rome', coords: [41.9028, 12.4964] },
            { id: 'assisi', step: 2, name: 'Assisi', coords: [43.0702, 12.6186] },
            { id: 'florence', step: 3, name: 'Florence', coords: [43.7695, 11.2558] },
            { id: 'cinque', step: 4, name: 'Cinque Terre', coords: [44.1353, 9.6828] },
            { id: 'venice', step: 5, name: 'End: Venice', coords: [45.4408, 12.3155] }
        ];

        // 2. All Detailed Locations (Housing, Sights, Food, Shopping) - STRICTLY INFORMATIONAL
        const extraLocations = [
            { id: 'rome-stay', type: 'stay', emoji: '🛏️', name: 'Casa di Santa Brigida', coords: [41.8955, 12.4711], desc: "A traditional convent stay offering private, air-conditioned rooms right in the historic center. Quiet, safe, and highly affordable, providing a unique glimpse into the city's religious heritage." },
            { id: 'pantheon', type: 'sight', emoji: '🏛️', name: 'The Pantheon', coords: [41.8986, 12.4769], desc: "Commissioned by Marcus Agrippa and rebuilt by Emperor Hadrian, it remains the largest unreinforced concrete dome in the world—a testament to brilliant ancient Roman engineering." },
            { id: 'colosseum', type: 'sight', emoji: '⚔️', name: 'Colosseum & Roman Forum', coords: [41.8902, 12.4922], desc: "The Colosseum was the ultimate symbol of imperial power, while the Forum was the political, legal, and religious nucleus of the ancient world." },
            { id: 'vatican', type: 'sight', emoji: '🖼️', name: 'Vatican Museums & Sistine Chapel', coords: [41.9065, 12.4536], desc: "Michelangelo's ceiling wasn't just art; it was a grueling physical feat that visually articulated the entire biblical narrative for the Christian world." },
            { id: 'borghese', type: 'sight', emoji: '🎨', name: 'Borghese Gallery', coords: [41.9139, 12.4922], desc: "Scipione Borghese was a ruthless cardinal whose immense patronage essentially bankrolled the Baroque era. The gallery houses Bernini's impossibly soft marbles." },
            { id: 'taverna', type: 'food', emoji: '🍝', name: 'La Taverna dei Fori Imperiali', coords: [41.8943, 12.4891], desc: "A highly-rated local spot to try the <em>Abbacchio al Forno</em> (classic Roman roast lamb) or the <em>Bucatini all'Amatriciana</em> (a rich pasta made with crispy pork cheek)." },
            { id: 'maritozzaro', type: 'food', emoji: '🥐', name: 'Il Maritozzaro', coords: [41.8814, 12.4646], desc: "Famous for the <em>Maritozzo</em>—a classic Roman sweet bun split and filled to the brim with fresh whipped cream. Perfect for a late-night sweet treat." },
            { id: 'boschetto', type: 'shop', emoji: '🛍️', name: 'Via del Boschetto Shopping', coords: [41.8967, 12.4905], desc: "Tucked right behind the Roman Forum, this street in the Monti neighborhood is famous for its independent artisan jewelry makers and vintage clothing boutiques." },
            
            { id: 'assisi-stay', type: 'stay', emoji: '🛏️', name: 'Monastero Sant\'Andrea', coords: [43.0715, 12.6135], desc: "A peaceful Umbrian retreat. Staying in a convent offers complete immersion in the quiet, deeply spiritual atmosphere of Assisi." },
            { id: 'basilica', type: 'sight', emoji: '⛪', name: 'Basilica of San Francesco', coords: [43.0745, 12.6062], desc: "This UNESCO site houses revolutionary frescoes by Giotto and Cimabue. These specific artworks are the crucial 'missing link' that transitioned flat Byzantine art into three-dimensional realism." },
            { id: 'eremo', type: 'nature', emoji: '🌲', name: 'Eremo delle Carceri', coords: [43.0645, 12.6515], desc: "A beautiful hike up Mount Subasio to the remote, forested network of caves where St. Francis and his followers retreated to pray in the 13th century." },
            { id: 'pallotta', type: 'food', emoji: '🍷', name: 'Trattoria Pallotta', coords: [43.0712, 12.6163], desc: "A perfect quiet dinner spot. Famous for <em>Stringozzi</em> pasta with locally foraged black truffles, rich wild boar (<em>cinghiale</em>) ragù, and <em>Rocciata</em> (apple/nut pastry)." },
            { id: 'ceramics', type: 'shop', emoji: '🏺', name: 'Deruta Ceramics', coords: [43.0720, 12.6150], desc: "Assisi is surrounded by artisans making incredible hand-painted Deruta ceramics and olive wood carvings. A perfect spot for a unique souvenir." },
            
            { id: 'florence-stay', type: 'stay', emoji: '🛏️', name: 'Fattoria Il Milione', coords: [43.7380, 11.2185], desc: "An Agriturismo is a working Italian farm and vineyard. It provides a unique, rustic Tuscan farmhouse experience surrounded by olive groves just outside the city." },
            { id: 'uffizi', type: 'sight', emoji: '🖼️', name: 'Uffizi Gallery', coords: [43.7677, 11.2556], desc: "'Uffizi' translates to 'offices.' This massive building was originally the administrative headquarters for the Medici family, whose staggering banking wealth funded the Renaissance." },
            { id: 'accademia', type: 'sight', emoji: '🗿', name: 'Accademia Gallery', coords: [43.7769, 11.2585], desc: "Michelangelo's <em>David</em> was not just a religious statue; it was commissioned as a political symbol of Florentine civil liberties and defiance against the powerful, exiled Medici family." },
            { id: 'duomo', type: 'sight', emoji: '⛪', name: 'Florence Duomo', coords: [43.7731, 11.2560], desc: "Filippo Brunelleschi's double-shell dome was an architectural miracle that effectively kicked off the Renaissance building boom." },
            { id: 'vinaio', type: 'food', emoji: '🥪', name: "All'Antico Vinaio", coords: [43.7684, 11.2573], desc: "Legendary street food spot famous for its massive <em>Sbriciolona</em> (fennel pork salami) schiacciata bread sandwiches." },
            { id: 'cuoio', type: 'shop', emoji: '👜', name: 'Scuola del Cuoio', coords: [43.7681, 11.2618], desc: "Tucked inside the Santa Croce monastery, this school allows visitors to watch artisans hand-tooling genuine leather jackets and bags, and buy directly from the makers." },
            
            { id: 'cinque-stay', type: 'stay', emoji: '🛏️', name: 'Affittacamere Anna', coords: [44.1705, 9.6148], desc: "A central homebase in Levanto. Affittacamere are run by locals, offering a much more authentic, home-grown feel than commercial hotels." },
            { id: 'vernazza', type: 'sight', emoji: '🏰', name: 'Vernazza & Doria Castle', coords: [44.1352, 9.6830], desc: "These five villages were entirely isolated by the steep mountains for centuries, birthing fiercely independent cultures. The Doria Castle ruins were built to protect the village from pirate raids." },
            { id: 'sentiero', type: 'nature', emoji: '🥾', name: 'Sentiero Azzurro (Blue Trail)', coords: [44.1177, 9.7123], desc: "This trail features ancient dry-stone walls holding up the terraces. Over centuries, local farmers literally carved the mountainside by hand to cultivate grapes and olives." },
            { id: 'nessun', type: 'food', emoji: '🥂', name: 'Nessun Dorma', coords: [44.1065, 9.7275], desc: "Located in Manarola, this is arguably the best sunset cocktail spot in Italy. It features incredible cured pork and local cheese platters right on the cliff edge." },
            { id: 'pescato', type: 'food', emoji: '🍤', name: 'Il Pescato Cucinato', coords: [44.0984, 9.7394], desc: "A great spot in Riomaggiore for a paper cone overflowing with hot, fresh-fried calamari, anchovies, and shrimp to eat by the harbor." },
            
            { id: 'venice-stay', type: 'stay', emoji: '🛏️', name: 'Foresteria Valdese', coords: [45.4374, 12.3392], desc: "These historic religious guest houses are located in genuine, quiet Venetian neighborhoods, far away from the tourist traps of St. Mark's." },
            { id: 'doge', type: 'sight', emoji: '🏛️', name: "Doge's Palace", coords: [45.4337, 12.3404], desc: "For a thousand years, the Venetian Republic was a ridiculously wealthy maritime empire. The 'Secret Itineraries' tour explores hidden offices and prison cells—including where Giacomo Casanova executed his legendary escape." },
            { id: 'murano', type: 'sight', emoji: '🔥', name: 'Murano Glass Island', coords: [45.4578, 12.3533], desc: "In 1291, the Republic forced all glassmakers to move here to violently guard the lucrative secrets of clear glassmaking from the rest of the world." },
            { id: 'domori', type: 'food', emoji: '🍢', name: 'Cantina Do Mori', coords: [45.4388, 12.3338], desc: "The oldest wine bar in Venice (est. 1462). A perfect stop on a Cicchetti crawl to grab fresh seafood and prosciutto crostini with a €3 glass of house wine." },
            { id: 'macana', type: 'shop', emoji: '🎭', name: "Ca' Macana Mask Makers", coords: [45.4316, 12.3242], desc: "This shop uses traditional historic molds to craft authentic Venetian papier-mâché masks (Stanley Kubrick even bought masks here for <em>Eyes Wide Shut</em>)." }
        ];

        const latlngs = locations.map(loc => loc.coords);
        L.polyline(latlngs, { color: '#4A6B53', weight: 3, dashArray: '8, 8', opacity: 0.9 }).addTo(map);

        // Main City Card Content (Kept Personal & Excited)
        const itineraryData = {
            'rome': `
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Colosseum_in_Rome-April_2007-1-_copie_2B.jpg/800px-Colosseum_in_Rome-April_2007-1-_copie_2B.jpg" alt="Colosseum in Rome" class="modal-hero-img">
                <h2>Days 1–3: Rome</h2>
                <div class="tag-container">
                    <span class="tag history">🏛️ Ancient Wonders</span>
                    <span class="tag history">🎨 Baroque Art</span>
                </div>
                
                <div class="why-block">
                    <h3>💜 Why I chose this for us</h3>
                    <p>[I will add my personal note here...]</p>
                </div>

                <details open>
                    <summary>Stay & Logistics</summary>
                    <div class="details-content">
                        <p><strong>Where:</strong> Casa di Santa Brigida or Casa Maria Immacolata. Book via <a href="https://www.monasterystays.com/" target="_blank">MonasteryStays.com</a>.</p>
                        <p><strong>Arrival Transit:</strong> Take the <a href="https://www.trenitalia.com/en.html" target="_blank">Leonardo Express train</a> from Fiumicino Airport directly to Roma Termini.</p>
                    </div>
                </details>
                <details>
                    <summary>Day 1: Arrival & Ancient Engineering</summary>
                    <div class="details-content">

        function getTagInfo(type) {
            switch(type) {
                case 'food': return { class: 'food', text: 'Local Eats' };
                case 'shop': return { class: 'water', text: 'Shopping' };
                case 'stay': return { class: 'stay', text: 'Accommodation' };
                case 'sight': return { class: 'history', text: 'History & Art' };
                case 'nature': return { class: 'nature', text: 'Outdoors' };
                default: return { class: 'history', text: 'Explore' };
            }
        }

        // Render the Main City numbered markers (forced to top layer)
        locations.forEach(loc => {
            const numberedIcon = L.divIcon({ 
                className: 'custom-pin', 
                html: `<span>${loc.step}</span>`,
                iconSize: [36, 36], 
                iconAnchor: [18, 18] 
            });
            
            const marker = L.marker(loc.coords, { 
                icon: numberedIcon,
                zIndexOffset: 1000 
            }).addTo(map);
            
            marker.bindTooltip(loc.name, { permanent: false, direction: 'top' });
            
            marker.on('click', () => {
                document.getElementById('itineraryDetails').innerHTML = itineraryData[loc.id];
                document.getElementById('modalOverlay').classList.add('active');
            });
        });

        // Render the Detailed Extra Markers
        extraLocations.forEach(loc => {
            const iconClass = `${loc.type}-pin`;
            const extraIcon = L.divIcon({
                className: `custom-pin ${iconClass}`,
                html: `<span>${loc.emoji}</span>`,
                iconSize: [28, 28], 
                iconAnchor: [14, 14]
            });
            
            const marker = L.marker(loc.coords, { icon: extraIcon }).addTo(map);
            marker.bindTooltip(loc.name, { permanent: false, direction: 'top' });
            
            const tagInfo = getTagInfo(loc.type);
            const popupHtml = `
                <h2>${loc.name}</h2>
                <div class="tag-container">
                    <span class="tag ${tagInfo.class}">${loc.emoji} ${tagInfo.text}</span>
                </div>
                <div class="details-content" style="padding: 0;">
                    <p>${loc.desc}</p>
                </div>
            `;

            marker.on('click', () => {
                document.getElementById('itineraryDetails').innerHTML = popupHtml;
                document.getElementById('modalOverlay').classList.add('active');
            });
        });

        // --- Sidebar Functionality ---
        function toggleSidebar() {
            const sidebar = document.getElementById('itinerarySidebar');
            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            } else {
                closeModal(); // Close map modals if open
                populateSidebar();
                sidebar.classList.add('active');
            }
        }

        function populateSidebar() {
            const sidebarContent = document.getElementById('sidebarContent');
            if (sidebarContent.innerHTML.trim() !== '') return; // Only populate once

            let fullHtml = '';
            locations.forEach(loc => {
                let htmlBlock = itineraryData[loc.id];
                
                // Remove the "Next Stop" button and the Hero Image for a cleaner text view
                htmlBlock = htmlBlock.replace(/<button class="next-btn"[\s\S]*?<\/button>/, '');
                htmlBlock = htmlBlock.replace(/<img class="modal-hero-img"[\s\S]*?>/, '');
                
                // Force all details to be open for easy scrolling
                htmlBlock = htmlBlock.replace(/<details>/g, '<details open>');

                fullHtml += `
                    <div class="sidebar-section">
                        ${htmlBlock}
                    </div>
                `;
            });
            sidebarContent.innerHTML = fullHtml;
        }

        // --- Modal Functionality ---
        function closeModal() { 
            document.getElementById('modalOverlay').classList.remove('active'); 
        }
        
        document.getElementById('modalOverlay').addEventListener('click', function(e) { 
            if(e.target === this) closeModal(); 
        });

        function startAdventure() {
            document.getElementById('welcomeOverlay').classList.remove('active');
            openCityCard('rome', 41.9028, 12.4964);
        }

        function openCityCard(cityId, lat, lng) {
            closeModal();
            map.flyTo([lat, lng], 13, {
                duration: 1.5,
                easeLinearity: 0.25
            });
            
            setTimeout(() => {
                document.getElementById('itineraryDetails').innerHTML = itineraryData[cityId];
                document.getElementById('modalOverlay').classList.add('active');
            }, 1000);
        }
    </script>
