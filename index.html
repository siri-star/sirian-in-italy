<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Italian Adventure</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary-bg: #F9F6F0; 
            --accent-color: #C84C35; 
            --accent-hover: #A63B28;
            --food-color: #D34E24;
            --shop-color: #205E7D;
            --stay-color: #B8860B; 
            --sight-color: #722F37; 
            --nature-color: #4A6B53; 
            --text-main: #2C2C2C;
            --text-light: #666666;
            --card-bg: #FFFFFF;
            --border-light: #EBE6DE;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            text-align: center;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            z-index: 1000;
            border-bottom: 2px solid var(--accent-color);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            margin: 0;
            font-size: 2.4rem;
        }

        p.subtitle {
            margin: 8px 0 0 0;
            color: var(--text-light);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 14px 24px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        .fab-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-4px) scale(1.05);
        }

        /* Sidebar Styling */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 550px; 
            height: 100vh;
            background-color: #FFFFFF; 
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            z-index: 2500;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .sidebar-header {
            padding: 25px 30px 15px 30px;
            background-color: #FAFAFA;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-close:hover { background: var(--accent-color); color: white; }

        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            padding-bottom: 100px;
            user-select: all; 
        }

        /* Modal & UI Styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 44, 44, 0.6); 
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            border-radius: 16px;
            padding: 35px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }
        #welcomeOverlay .modal-content { text-align: center; max-width: 500px; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }

        .close-btn:hover { background: var(--accent-color); }
        .modal-hero-img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 25px; }
        
        .why-block {
            background: #F4E8EA; border-left: 4px solid #722F37; padding: 18px 20px; margin: 25px 0; border-radius: 0 8px 8px 0; text-align: left;
        }
        .why-block h3 { margin-top: 0; color: #722F37; font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 8px; }
        .why-block p { margin: 0; font-style: italic; }

        .next-btn {
            background-color: var(--accent-color); color: white; border: none; padding: 16px 24px; font-size: 1.1rem; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%;
        }

        details { background: #FFFFFF; border-radius: 8px; border: 1px solid var(--border-light); margin-bottom: 12px; }
        summary { padding: 18px 20px; font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.2rem; cursor: pointer; list-style: none; display: flex; justify-content: space-between; }
        summary::-webkit-details-marker { display: none; }
        summary:after { content: "+"; color: var(--accent-color); }
        details[open] summary:after { transform: rotate(45deg); }
        details[open] summary { background: var(--primary-bg); border-bottom: 1px solid var(--border-light); }
        .details-content { padding: 20px; font-size: 1rem; line-height: 1.6; }

        h2 { font-family: 'Playfair Display', serif; color: var(--accent-color); border-bottom: 2px solid var(--border-light); padding-bottom: 12px; margin-top: 0; margin-bottom: 20px; font-size: 2rem; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .tag { display: inline-flex; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .tag.history { background: #F4E8EA; color: #722F37; } 
        .tag.food { background: #FCEEEB; color: #D34E24; } 
        .tag.nature { background: #EAF1EB; color: #4A6B53; } 
        .tag.water { background: #E6F0F5; color: #205E7D; } 
        .tag.stay { background: #FDF6E3; color: #B8860B; } 

        a { color: var(--accent-color); text-decoration: none; font-weight: 700; }
        ul { padding-left: 20px; margin-top: 5px; }
        li { margin-bottom: 12px; }

        /* CYOA & Shimmer Styles */
        .cyoa-container { margin: 15px 0; padding: 20px; background: #FAFAFA; border-radius: 12px; border: 2px dashed #EBE6DE; }
        .cyoa-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent-color); margin-top: 0; margin-bottom: 15px; text-align: center; }
        .cyoa-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .cyoa-btn { flex: 1; padding: 10px 5px; border: 2px solid var(--accent-color); background: transparent; color: var(--accent-color); border-radius: 8px; font-weight: 700; cursor: pointer; }
        .cyoa-btn.active { background: var(--accent-color); color: white; }
        .cyoa-content { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border-light); min-height: 100px; }
        
        .shimmer-block { padding: 10px 0; }
        .shimmer-line {
            height: 12px; margin-bottom: 12px; border-radius: 4px; background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat; background-size: 800px 100%;
            animation: placeholderShimmer 1.5s linear infinite forwards;
        }
        .shimmer-line.w-90 { width: 90%; }
        .shimmer-line.w-75 { width: 75%; }
        .shimmer-line.w-50 { width: 50%; }

        @keyframes placeholderShimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }

        /* Map Pins */
        .custom-pin { background-color: var(--accent-color); border: 2px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 700; }
        .food-pin { background-color: var(--food-color); font-size: 14px; }
        .shop-pin { background-color: var(--shop-color); font-size: 14px; }
        .stay-pin { background-color: var(--stay-color); font-size: 14px; }
        .sight-pin { background-color: var(--sight-color); font-size: 14px; }
        .nature-pin { background-color: var(--nature-color); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>Our Italian Adventure</h1>
        <p class="subtitle">14 Days of History, Art & Culinary Magic</p>
    </header>

    <div id="map"></div>

    <button class="fab-btn" onclick="toggleSidebar()">📜 View Itinerary</button>

    <div class="sidebar" id="itinerarySidebar">
        <div class="sidebar-header">
            <span style="font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent-color);">Itinerary Document</span>
            <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>

    <!-- Birthday Welcome Modal -->
    <div class="modal-overlay active" id="welcomeOverlay">
        <div class="modal-content">
            <h2 style="border: none; margin-bottom: 10px;">Happy 25th Birthday, Damian!! 💜</h2>
            <p style="font-size: 1.1rem; color: var(--text-light); line-height: 1.6; margin-bottom: 30px;">
                [I will write my birthday message to you here...]
            </p>
            <button class="next-btn" onclick="startAdventure()">Start Our Adventure ➔</button>
        </div>
    </div>

    <!-- Main Itinerary Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="itineraryDetails"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([43.0, 12.0], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 20
        }).addTo(map);

        // State object defaults to null so the shimmers show until picked
        const adventureState = {
            rome: null,
            assisi: null,
            florence: null,
            cinque: null,
            venice: null
        };

        const locations = [
            { id: 'rome', step: 1, name: 'Start: Rome', coords: [41.9028, 12.4964] },
            { id: 'assisi', step: 2, name: 'Assisi', coords: [43.0702, 12.6186] },
            { id: 'florence', step: 3, name: 'Florence', coords: [43.7695, 11.2558] },
            { id: 'cinque', step: 4, name: 'Cinque Terre', coords: [44.1353, 9.6828] },
            { id: 'venice', step: 5, name: 'End: Venice', coords: [45.4408, 12.3155] }
        ];

        // Fully Detailed Extra Locations (Informational)
        const extraLocations = [
            // ROME
            { id: 'rome-stay', type: 'stay', emoji: '🛏️', name: 'Casa di Santa Brigida', coords: [41.8955, 12.4711], desc: "Located off Piazza Farnese, this traditional convent stay run by the Birgittine Sisters offers a tranquil, historic base right in the heart of the city. Booking is available directly through <a href='https://www.monasterystays.com/' target='_blank'>MonasteryStays</a>." },
            { id: 'pantheon', type: 'sight', emoji: '🏛️', name: 'The Pantheon', coords: [41.8986, 12.4769], desc: "Built around 125 AD, the Pantheon features a perfectly proportioned unreinforced concrete dome and a central oculus. Tickets available via the <a href='https://portale.museiitaliani.it/b2c/' target='_blank'>Musei Italiani site</a>." },
            { id: 'colosseum', type: 'sight', emoji: '⚔️', name: 'Colosseum & Roman Forum', coords: [41.8902, 12.4922], desc: "The Flavian Amphitheatre (completed in 80 AD) once held 50,000 spectators for gladiatorial contests. Adjacent lies the Forum, the excavated heart of ancient Roman politics and commerce. <a href='https://parcocolosseo.it/en/' target='_blank'>Official Parco Colosseo Site</a>." },
            { id: 'vatican', type: 'sight', emoji: '🖼️', name: 'Vatican Museums & Sistine Chapel', coords: [41.9065, 12.4536], desc: "Spanning 54 galleries, the museums house centuries of papal art acquisitions, culminating in Michelangelo's breathtaking Sistine Chapel frescoes. <a href='https://m.museivaticani.va/content/museivaticani-mobile/en.html' target='_blank'>Book Prime Experience Here</a>." },
            { id: 'borghese', type: 'sight', emoji: '🎨', name: 'Borghese Gallery', coords: [41.9139, 12.4922], desc: "Set in the Villa Borghese Pinciana, this gallery contains masterpieces of the Renaissance and Baroque, including Bernini's <em>Apollo and Daphne</em>. <a href='https://galleriaborghese.beniculturali.it/en/' target='_blank'>Official Booking</a>." },
            { id: 'taverna', type: 'food', emoji: '🍝', name: 'La Taverna dei Fori Imperiali', coords: [41.8943, 12.4891], desc: "A renowned, family-run restaurant serving classic Roman dishes like <em>Abbacchio al Forno</em> (roast lamb) and crispy <em>Cacio e Pepe</em>." },
            { id: 'maritozzaro', type: 'food', emoji: '🥐', name: 'Il Maritozzaro', coords: [41.8814, 12.4646], desc: "A legendary 1960s café famous across Rome for serving the ultimate <em>Maritozzo</em>—a sweet brioche-like bun overflowing with freshly whipped panna." },
            { id: 'boschetto', type: 'shop', emoji: '🛍️', name: 'Via del Boschetto', coords: [41.8967, 12.4905], desc: "The artistic soul of the Monti district, known for its bohemian vibe, independent artisan jewelry makers, and curated vintage clothing boutiques." },
            
            // ASSISI
            { id: 'assisi-stay', type: 'stay', emoji: '🛏️', name: 'Monastero Sant\'Andrea', coords: [43.0715, 12.6135], desc: "Run by Franciscan sisters, this medieval stone monastery offers panoramic views of the Umbrian valley and a profoundly quiet, spiritual atmosphere." },
            { id: 'basilica', type: 'sight', emoji: '⛪', name: 'Basilica of San Francesco', coords: [43.0745, 12.6062], desc: "Consecrated in 1228, this complex features an Upper and Lower basilica adorned with groundbreaking frescoes by Giotto. <a href='https://www.sanfrancescoassisi.org/en/' target='_blank'>Official Site</a>." },
            { id: 'eremo', type: 'nature', emoji: '🌲', name: 'Eremo delle Carceri', coords: [43.0645, 12.6515], desc: "A steep 4km hike into a dense oak forest reveals this network of tiny chapels and caves carved directly into the rock where St. Francis retreated for isolated prayer." },
            { id: 'pallotta', type: 'food', emoji: '🍷', name: 'Trattoria Pallotta', coords: [43.0712, 12.6163], desc: "Situated in Piazza del Comune under historic stone vaults, this trattoria specializes in Umbrian <em>Stringozzi</em> pasta, black truffles, and rich wild boar ragù." },
            { id: 'ceramics', type: 'shop', emoji: '🏺', name: 'Deruta Ceramics Artisans', coords: [43.0720, 12.6150], desc: "Assisi preserves the local Umbrian tradition of Majolica pottery, recognizable by its vibrant blues, yellows, and intricate geometric Renaissance patterns." },
            
            // FLORENCE
            { id: 'florence-stay', type: 'stay', emoji: '🛏️', name: 'Fattoria Il Milione', coords: [43.7380, 11.2185], desc: "A stunning 15th-century estate set on 50 hectares of parkland in the Chianti hills, acting as an authentic Agriturismo base just outside the bustling city." },
            { id: 'uffizi', type: 'sight', emoji: '🖼️', name: 'Uffizi Gallery', coords: [43.7677, 11.2556], desc: "Designed by Vasari, the Uffizi houses the world's greatest collection of Italian Renaissance art, including Botticelli's <em>Birth of Venus</em>. <a href='https://www.uffizi.it/en/the-uffizi' target='_blank'>Official Uffizi Site</a>." },
            { id: 'accademia', type: 'sight', emoji: '🗿', name: 'Accademia Gallery', coords: [43.7769, 11.2585], desc: "Founded in 1784, this gallery's crown jewel is Michelangelo's <em>David</em> (1504). <a href='https://www.galleriaaccademiafirenze.it/en/' target='_blank'>Accademia Tickets</a>." },
            { id: 'duomo', type: 'sight', emoji: '⛪', name: 'Florence Duomo', coords: [43.7731, 11.2560], desc: "The Cattedrale di Santa Maria del Fiore, famous for Brunelleschi's massive red-tiled dome. Climbing it requires navigating 463 narrow stone steps. <a href='https://duomo.firenze.it/en/home' target='_blank'>Brunelleschi Pass</a>." },
            { id: 'vinaio', type: 'food', emoji: '🥪', name: "All'Antico Vinaio", coords: [43.7684, 11.2573], desc: "Located on Via dei Neri, this is Italy's most famous street food spot, serving massive, freshly baked schiacciata bread overflowing with Tuscan meats. <a href='https://www.allanticovinaio.com/' target='_blank'>View Menu</a>." },
            { id: 'cuoio', type: 'shop', emoji: '👜', name: 'Scuola del Cuoio', coords: [43.7681, 11.2618], desc: "Founded post-WWII, this leather school sits inside the Santa Croce dormitories. Visitors can watch masters tool and gild authentic Florentine leather. <a href='https://scuoladelcuoio.it/en/' target='_blank'>Learn More</a>." },
            
            // CINQUE TERRE
            { id: 'cinque-stay', type: 'stay', emoji: '🛏️', name: 'Affittacamere Anna', coords: [44.1705, 9.6148], desc: "A comfortable, locally-run guesthouse basecamp in Levanto, providing a quiet escape from the heavily trafficked five main villages." },
            { id: 'vernazza', type: 'sight', emoji: '🏰', name: 'Vernazza & Doria Castle', coords: [44.1352, 9.6830], desc: "Arguably the most picturesque of the villages, characterized by steep, narrow alleys leading up to an 11th-century watchtower." },
            { id: 'sentiero', type: 'nature', emoji: '🥾', name: 'Sentiero Azzurro (Blue Trail)', coords: [44.1177, 9.7123], desc: "A legendary 12km coastal path connecting the villages. Hikers navigate cliffside vineyards and olive groves. <a href='https://www.parconazionale5terre.it/page.php?id=157' target='_blank'>Cinque Terre MS Card</a>." },
            { id: 'nessun', type: 'food', emoji: '🥂', name: 'Nessun Dorma', coords: [44.1065, 9.7275], desc: "A world-famous Manarola cliffside terrace focusing entirely on local bruschetta, meat platters, and pesto making. <a href='https://www.nessundormacinqueterre.com/' target='_blank'>Download their virtual queue app</a>." },
            { id: 'pescato', type: 'food', emoji: '🍤', name: 'Il Pescato Cucinato', coords: [44.0984, 9.7394], desc: "A beloved 'hole in the wall' in Riomaggiore frying up the daily catch. Known for their legendary <em>fritto misto</em> served in paper cones." },
            
            // VENICE
            { id: 'venice-stay', type: 'stay', emoji: '🛏️', name: 'Foresteria Valdese', coords: [45.4374, 12.3392], desc: "Located in the Castello district inside the historic Palazzo Cavagnis. Rooms feature 16th-century frescoes, and proceeds support Waldensian charities." },
            { id: 'doge', type: 'sight', emoji: '🏛️', name: "Doge's Palace", coords: [45.4337, 12.3404], desc: "A Venetian Gothic masterpiece and the historical seat of the Republic's power. It connects to the grim prison cells via the famous Bridge of Sighs. <a href='https://palazzoducale.visitmuve.it/en/home/' target='_blank'>Official Tickets</a>." },
            { id: 'murano', type: 'sight', emoji: '🔥', name: 'Murano Glass Island', coords: [45.4578, 12.3533], desc: "A short Vaporetto ride away, this island has been the global hub of elite glassmaking since 1291. Visitors can watch master artisans manipulate glowing silica." },
            { id: 'domori', type: 'food', emoji: '🍢', name: 'Cantina Do Mori', coords: [45.4388, 12.3338], desc: "Tucked into San Polo 429 beneath hanging copper pots, this is rumored to have been Casanova's watering hole. A mandatory stop for <em>cicchetti</em> (Venetian tapas)." },
            { id: 'macana', type: 'shop', emoji: '🎭', name: "Ca' Macana Mask Makers", coords: [45.4316, 12.3242], desc: "Located in Dorsoduro, this elite workshop creates authentic papier-mâché masks, completely eschewing modern plastics. <a href='https://www.camacana.com/' target='_blank'>Book a workshop here</a>." }
        ];

        const latlngs = locations.map(loc => loc.coords);
        L.polyline(latlngs, { color: '#4A6B53', weight: 3, dashArray: '8, 8' }).addTo(map);

        // Helper function for Tag UI mapping
        function getTagInfo(type) {
            switch(type) {
                case 'food': return { class: 'food', text: 'Local Eats' };
                case 'shop': return { class: 'water', text: 'Shopping' };
                case 'stay': return { class: 'stay', text: 'Accommodation' };
                case 'sight': return { class: 'history', text: 'History & Art' };
                case 'nature': return { class: 'nature', text: 'Outdoors' };
                default: return { class: 'history', text: 'Explore' };
            }
        }

        // Generates the Shimmer effect block
        function getShimmerBlock() {
            return `
                <div class="shimmer-block">
                    <div class="shimmer-line w-90"></div>
                    <div class="shimmer-line w-75"></div>
                    <div class="shimmer-line w-90"></div>
                    <div class="shimmer-line w-50"></div>
                </div>
            `;
        }

        function getItineraryHtml(cityId) {
            if (cityId === 'rome') {
                return `
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Colosseum_in_Rome-April_2007-1-_copie_2B.jpg/800px-Colosseum_in_Rome-April_2007-1-_copie_2B.jpg" class="modal-hero-img">
                    <h2>Days 1–3: Rome</h2>
                    <div class="tag-container">
                        <span class="tag history">🏛️ Ancient Wonders</span>
                        <span class="tag history">🎨 Baroque Art</span>
                    </div>
                    <div class="why-block"><h3>💜 Why I chose this for us</h3><p>[I will add my personal note here...]</p></div>
                    <details open><summary>Day 1: Arrival</summary><div class="details-content"><ul>
                        <li><strong>2:00 PM:</strong> Arrive via train, check into our convent, and drop our bags!</li>
                        <li><strong>4:00 PM:</strong> Head to the Pantheon. We'll marvel at the massive unreinforced concrete dome.</li>
